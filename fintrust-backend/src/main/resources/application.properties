# Application settings
server.port=8080
spring.application.name=fintrust-backend

# MySQL Configuration (Default for persistent storage)
spring.datasource.url=jdbc:mysql://localhost:3306/fintrust?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Configurations (Secret must be at least 256 bits / 32 bytes)
app.jwt.secret=9a4f2c8d3b7a1e5f8g9h0i1j2k3l4m5n6o7p8q9r0s1t2u3v4w5x6y7z8a9b0c1d
app.jwt.expiration-ms=86400000

# Gemini API Integration
app.gemini.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
app.gemini.key=${GEMINI_API_KEY:}

# File Upload Configuration
file.upload-dir=./uploads/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
